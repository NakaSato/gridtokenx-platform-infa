apiVersion: 1

providers:
  - name: 'GridTokenX APM Dashboards'
    orgId: 1
    folder: 'GridTokenX'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 15
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true
