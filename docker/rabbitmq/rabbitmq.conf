# RabbitMQ Configuration for GridTokenX
# Reference: https://www.rabbitmq.com/docs/configure

# Cluster & Network
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1 = rabbit@gridtokenx-rabbitmq

# Memory & Disk Thresholds
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 50MB

# Message TTL Defaults
default_consumer_timeout = 3600000

# Queue Configuration
queue_master_locator = min-masters
queue_index_embed_msgs_below = 4096

# Logging
log.default = info
log.file = rabbit.log
log.file.level = info
log.console = true
log.console.level = info

# Prometheus Metrics
prometheus.return_per_object_metrics = true

# TLS (Disabled for development, enable in production)
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/ca_certificate.pem
# ssl_options.certfile = /etc/rabbitmq/server_certificate.pem
# ssl_options.keyfile = /etc/rabbitmq/server_key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true

# Management Plugin
management.tcp.port = 15672
management.load_definitions = /etc/rabbitmq/definitions.json
