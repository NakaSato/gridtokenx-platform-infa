events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream apigateway_nodes {
        # The app.sh script will spawn backend instances on host map 4001 & 4002
        # Use host.docker.internal to route from the nginx container out to the mac host network
        server host.docker.internal:4001 max_fails=3 fail_timeout=10s;
        server host.docker.internal:4002 max_fails=3 fail_timeout=10s;
        
        # Enable sticky sessions (optional, but good for some WS contexts if Redis wasn't global)
        # ip_hash; 
    }

    server {
        listen 4000;
        server_name localhost;

        # Add timeouts to prevent hanging sockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass http://apigateway_nodes;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health endpoint for load balancer check
        location /health {
            access_log off;
            return 200 'healthy\n';
        }
    }
}
