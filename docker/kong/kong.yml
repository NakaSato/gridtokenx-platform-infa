_format_version: "3.0"
_transform: true

services:
  - name: api-services
    url: http://api-services:4000
    routes:
      - name: api-route
        paths:
          - /api/v1
          - /api/meters
        strip_path: false
      - name: health-route
        paths:
          - /health
        strip_path: false
      - name: ws-route
        paths:
          - /ws
        strip_path: false

  - name: iam-service
    url: http://iam-service:8080
    routes:
      - name: iam-route
        paths:
          - /iam
        strip_path: true

  - name: trading-service
    url: http://trading-service:8092
    routes:
      - name: trading-route
        paths:
          - /trading
        strip_path: true

  - name: trading-service-rest
    url: http://trading-service:8093
    routes:
      - name: settlement-route
        paths:
          - /api/v1/settlement
        strip_path: false
        plugins:
          - name: ip-restriction
            config:
              allow:
                - 172.16.0.0/12
                - 127.0.0.1
              status: 403
              message: "Access restricted to Oracle Bridge only"
            enabled: true

  - name: simulator-api
    url: http://smartmeter-simulator:8080
    routes:
      - name: simulator-route
        paths:
          - /simulator
        strip_path: true

  - name: oracle-bridge
    url: http://oracle-bridge:4010
    routes:
      - name: oracle-route
        paths:
          - /oracle
        strip_path: true

  - name: solana-rpc
    url: http://host.orbstack.local:8899
    routes:
      - name: solana-route
        paths:
          - /solana
        strip_path: true

  - name: solana-ws
    url: http://host.orbstack.local:8900
    routes:
      - name: solana-ws-route
        paths:
          - /solana-ws
        strip_path: true

  - name: prometheus
    url: http://prometheus:9090
    routes:
      - name: prometheus-route
        paths:
          - /metrics-admin
        strip_path: true

  - name: grafana
    url: http://grafana:3000
    routes:
      - name: grafana-route
        paths:
          - /grafana
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      second: 200
      hour: 10000
    enabled: true
  - name: opentelemetry
    config:
      traces_endpoint: http://otel-collector:4318/v1/traces
      resource_attributes:
        service.name: "gridtokenx-kong"
      header_type: preserve
      sampling_rate: 1.0
    enabled: true
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Accept", "Accept-Version", "Content-Length", "Content-MD5", "Content-Type", "Date", "X-Api-Version", "Authorization"]
      exposed_headers: ["X-Auth-Token"]
      credentials: true
      max_age: 3600
    enabled: true
