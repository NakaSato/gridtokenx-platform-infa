services:
  # PostgreSQL Database for API (Primary)
  postgres:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_duration=on"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      # Replication settings
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "synchronous_commit=off"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh:ro
      - ./scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    networks:
      - gridtokenx-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database for API (Replica)
  postgres-replica:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres-replica
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRIMARY_HOST: postgres
      TZ: ${TZ}
    entrypoint: [ "/bin/sh", "/scripts/init-replica.sh" ]
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sh:/scripts/init-replica.sh:ro
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache for API (Primary)
  redis:
    image: redis:7-alpine
    container_name: gridtokenx-redis
    environment:
      TZ: ${TZ}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gridtokenx-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis Cache for API (Replica)
  redis-replica:
    image: redis:7-alpine
    container_name: gridtokenx-redis-replica
    command: redis-server --replicaof redis 6379
    environment:
      TZ: ${TZ}
    ports:
      - "6380:6379"
    volumes:
      - redis_replica_data:/data
    networks:
      - gridtokenx-network
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2.7-alpine
    container_name: gridtokenx-influxdb
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: "curl -f http://localhost:8086/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka Message Broker (KRaft Mode - No Zookeeper)
  kafka:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    environment:
      TZ: ${TZ}
      # KRaft Configuration (No Zookeeper needed)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic Configuration
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # Performance Tuning
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID for KRaft
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kong (API Gateway & Management)
  kong:
    image: kong/kong-gateway:latest
    container_name: gridtokenx-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_PROXY_LISTEN: 0.0.0.0:4000, 0.0.0.0:8443 ssl
    ports:
      - "4001:4000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./docker/kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    networks:
      - gridtokenx-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # API Gateway (Rust/Axum)
  api-gateway:
    build:
      context: ./
      dockerfile: gridtokenx-api/Dockerfile
    container_name: gridtokenx-api-gateway
    ports:
      - "${APIGATEWAY_PORT}:4000"
    volumes:
      - ./dev-wallet.json:/app/dev-wallet.json
    environment:
      # Application Configuration
      TZ: ${TZ}
      PORT: 4000
      SERVER_HOST: ${SERVER_HOST}
      ENVIRONMENT: ${ENVIRONMENT}
      RUST_LOG: ${RUST_LOG}
      LOG_LEVEL: ${LOG_LEVEL}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
      TEST_MODE: ${TEST_MODE:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:${REDIS_PORT}
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8086}
      IAM_SERVICE_URL: http://iam-service:8080
      IAM_GRPC_URL: http://iam-service:8090
      TRADING_SERVICE_URL: http://trading-service:8092
      TRADING_GRPC_URL: http://trading-service:8092
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://host.orbstack.local:8899}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-ws://host.orbstack.local:8900}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gridtokenx-api-gateway
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-always_on}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      SOLANA_REGISTRY_PROGRAM_ID: ${SOLANA_REGISTRY_PROGRAM_ID}
      SOLANA_TRADING_PROGRAM_ID: ${SOLANA_TRADING_PROGRAM_ID}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID}
      SOLANA_GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      SOLANA_ENERGY_TOKEN_PROGRAM_ID: ${SOLANA_ENERGY_TOKEN_PROGRAM_ID}
      ENERGY_TOKEN_MINT: ${ENERGY_TOKEN_MINT}
      ENGINEERING_API_KEY: ${ENGINEERING_API_KEY}
      API_KEY_SECRET: ${API_KEY_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-50}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-20}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped
  iam-service:
    build:
      context: ./
      dockerfile: gridtokenx-iam-service/Dockerfile
    container_name: gridtokenx-iam-service
    ports:
      - "4002:8080"
      - "4012:8090"
    environment:
      DATABASE_URL: ${IAM_DATABASE_URL}
      REDIS_URL: redis://redis:${REDIS_PORT}
      PORT: 8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gridtokenx-iam-service
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      RUST_LOG: ${RUST_LOG:-info}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Trading Service
  trading-service:
    build:
      context: ./
      dockerfile: gridtokenx-trading-service/Dockerfile
    container_name: gridtokenx-trading-service
    ports:
      - "8092:8092"
      - "8093:8093"
    volumes:
      - ./dev-wallet.json:/app/dev-wallet.json
    environment:
      DATABASE_URL: ${TRADING_DATABASE_URL}
      REDIS_URL: redis://redis:${REDIS_PORT}
      RUST_LOG: ${RUST_LOG:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gridtokenx-trading-service
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://host.orbstack.local:8899}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-ws://host.orbstack.local:8900}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      SOLANA_REGISTRY_PROGRAM_ID: ${SOLANA_REGISTRY_PROGRAM_ID}
      SOLANA_TRADING_PROGRAM_ID: ${SOLANA_TRADING_PROGRAM_ID}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID}
      SOLANA_GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      SOLANA_ENERGY_TOKEN_PROGRAM_ID: ${SOLANA_ENERGY_TOKEN_PROGRAM_ID}
      ENERGY_TOKEN_MINT: ${ENERGY_TOKEN_MINT}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      PAYER_PRIVATE_KEY: ${PAYER_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Oracle Bridge + IoT Ingestion Gateway
  oracle-bridge:
    build:
      context: ./
      dockerfile: gridtokenx-oracle-bridge/Dockerfile
    container_name: gridtokenx-oracle-bridge
    ports:
      - "${IOT_GATEWAY_PORT:-4010}:4010"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      REDIS_URL: redis://redis:6379
      API_GATEWAY_URL: http://api-gateway:4000
      IOT_GATEWAY_PORT: 4010
      IAM_SERVICE_URL: http://iam-service:8080
      GRIDTOKENX_API_KEYS: ${ENGINEERING_API_KEY:-engineering-department-api-key-2025}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gridtokenx-oracle-bridge
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Trading Platform (Next.js)
  trading-ui:
    build:
      context: ./gridtokenx-trading
      dockerfile: Dockerfile
    container_name: gridtokenx-trading
    ports:
      - "${TRADING_PORT}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL}
      NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL: ${NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL}
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Mailpit SMTP Server (Development Email Testing)

  # Mailpit SMTP Server (Development Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: gridtokenx-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT}:1025" # SMTP server
      - "${MAILPIT_WEB_PORT}:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: ${MP_MAX_MESSAGES}
      MP_DATABASE: ${MP_DATABASE}
      MP_SMTP_AUTH_ACCEPT_ANY: ${MP_SMTP_AUTH_ACCEPT_ANY}
      MP_SMTP_AUTH_ALLOW_INSECURE: ${MP_SMTP_AUTH_ALLOW_INSECURE}
      TZ: ${TZ}
    volumes:
      - mailpit_data:/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/api/v1/info" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Smart Meter Simulator (Python/FastAPI)
  smartmeter-simulator:
    build:
      context: ./gridtokenx-smartmeter-simulator
      dockerfile: Dockerfile
    container_name: gridtokenx-smartmeter-simulator
    ports:
      - "${SMARTMETER_PORT:-8082}:8080"
    environment:
      TZ: ${TZ}
      PORT: 8080 # Internally 8080, externally mapped to ${SMARTMETER_PORT} (8082)
      LOG_LEVEL: ${LOG_LEVEL}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_GATEWAY_URL: ${API_GATEWAY_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gridtokenx-smartmeter-simulator
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./gridtokenx-smartmeter-simulator/data:/app/data
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Smart Meter Simulator UI (React/Vite)
  smartmeter-ui:
    build:
      context: ./gridtokenx-smartmeter-simulator/ui
      dockerfile: Dockerfile
    container_name: gridtokenx-smartmeter-ui
    ports:
      - "5173:80"
    depends_on:
      - smartmeter-simulator
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: gridtokenx-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Tempo - Tracing Backend
  tempo:
    image: grafana/tempo:2.6.0
    container_name: gridtokenx-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # ============================================
  # Monitoring Stack: Prometheus + Grafana
  # ============================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: gridtokenx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--enable-feature=remote-write-receiver'
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gridtokenx-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: gridtokenx-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks:
      - gridtokenx-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Kafka Exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: gridtokenx-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    networks:
      - gridtokenx-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gridtokenx-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gridtokenx-cadvisor
    ports:
      - "9082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.5.0
    container_name: gridtokenx-grafana
    ports:
      - "3001:3000"  # Changed to 3001 to avoid conflict
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - gridtokenx-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # OTEL Collector (Ingestion Agent)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: gridtokenx-otel-collector
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      - "8888:8888"     # Monitoring metrics
      - "13133:13133"   # Health check
    networks:
      - gridtokenx-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

networks:
  gridtokenx-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  redis_replica_data:
  influxdb_data:
  influxdb_config:
  mailpit_data:
  kafka_data:
  loki_data:
  tempo_data:
  prometheus_data:
  grafana_data:
