# Standalone Cargo.toml for Docker/OrbStack build (API Gateway only)
# This file is used during Docker builds to avoid workspace dependencies

[workspace]
members = [
    "gridtokenx-api",
    "gridtokenx-iam-service",
    "gridtokenx-trading-service",
    "gridtokenx-oracle-bridge",
]
resolver = "2"

[workspace.dependencies]
# Web Framework
axum = { version = "0.8.7", features = ["macros", "ws"] }
tower = { version = "0.5", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.6.7", features = ["cors", "trace", "timeout", "compression-gzip"] }
hyper = { version = "1.8.1", features = ["http1", "http2", "server"] }
http-body-util = "0.1"

# Async Runtime
tokio = { version = "1.48", features = ["rt-multi-thread", "macros", "io-util", "time", "sync", "signal", "parking_lot"] }
futures = "0.3"

# Database
sqlx = { version = "0.8", default-features = false, features = ["macros", "postgres", "runtime-tokio-rustls", "chrono", "uuid", "rust_decimal", "migrate", "ipnetwork"] }
bigdecimal = { version = "0.4", features = ["serde"] }
ipnetwork = { version = "0.21.1", features = ["serde"] }
rusqlite = { version = "0.32", features = ["bundled"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Authentication
jsonwebtoken = { version = "10.0", default-features = false, features = ["use_pem", "rust_crypto"] }
bcrypt = "0.17"
argon2 = "0.5"

# Caching
redis = { version = "0.32", features = ["tokio-comp", "connection-manager"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
metrics = "0.24"
metrics-exporter-prometheus = "0.17"
prometheus = "0.14.0"

# OpenTelemetry (SigNoz integration)
opentelemetry = "0.31.0"
opentelemetry-otlp = { version = "0.31.0", features = ["grpc-tonic", "trace", "metrics", "logs"] }
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio", "trace"] }
tracing-opentelemetry = "0.32.1"
opentelemetry-semantic-conventions = "0.31.0"

# gRPC
connectrpc = { version = "0.2.1", features = ["axum", "server", "client"] }
tonic = "0.12"
buffa = "0.2.0"
http-body = "1.0.0"
http = "1.0.0"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
ulid = { version = "1.0", features = ["serde"] }
rust_decimal = { version = "1.33", features = ["serde-float", "maths"] }
itertools = "0.14"
strum = { version = "0.26", features = ["derive"] }
strum_macros = "0.26"
rust_decimal_macros = "1.36"
anyhow = "1.0"
thiserror = "2.0"
config = "0.15.19"
dotenvy = "0.15"
sha2 = "0.10"
async-trait = "0.1"
once_cell = "1.19"

# HTTP Client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip"] }

# Validation
validator = { version = "0.19", features = ["derive"] }
regex = "1.10"
sysinfo = "0.33"

# OpenAPI Documentation
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono", "decimal"] }
utoipa-swagger-ui = { version = "9.0.2", features = ["axum"] }

# Email
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls-tls", "builder", "hostname"] }

# Blockchain utilities
bs58 = "0.5"
ed25519-dalek = "2.1"
rand = { version = "0.8", features = ["std", "std_rng"] }
aes-gcm = "0.10"
pbkdf2 = "0.12"

# Solana - using standalone versions (not workspace)
solana-client = { version = "2.3.1", default-features = false }
solana-sdk = "2.3.1"
solana-program = "2.3.0"
spl-token = "8.0.0"
spl-token-2022 = "8.0.0"
spl-associated-token-account = "7.0.0"
anchor-client = "0.32.1"
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
dashmap = "6.1.0"
solana-compute-budget = "2.3.1"
solana-transaction-status = "2.3.1"
hmac = "0.12.1"
hex = "0.4.3"
base64 = "0.21"
bincode = "1.3"
rustc-hash = "1.1"

# Dev dependencies
tokio-test = "0.4"
testcontainers = "0.25"
wiremock = "0.6"
criterion = "0.7"
proptest = "1.4"
tempfile = "3.8"
clap = { version = "4.4", features = ["derive"] }

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"
